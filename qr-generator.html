<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tashkent Metro - QR Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- QR Code Library CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --line-chilonzor: #ef4444;
            /* Red */
            --line-ozbekiston: #3b82f6;
            /* Blue */
            --line-yunusobod: #10b981;
            /* Green */
            --line-halqa: #f59e0b;
            /* Gold/Yellow */
            --bg-color: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
        }

        .controls {
            text-align: center;
            margin-bottom: 40px;
        }

        .controls button {
            padding: 12px 24px;
            font-size: 1.1rem;
            background-color: var(--line-ozbekiston);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .controls button:hover {
            background-color: #2563eb;
        }

        #qr-container {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: center;
        }

        /* Printable A5/A4 Layout Frame */
        .qr-card {
            background: white;
            width: 148mm;
            /* A5 width */
            height: 210mm;
            /* A5 height */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            box-sizing: border-box;
            border-radius: 16px;
            border: 12px solid #ccc;
            /* Default fallback border */
            position: relative;
            overflow: hidden;
            page-break-after: always;
            /* Ensure each prints on a new page */
        }

        /* Border Color Based on Lines */
        .qr-card.chilonzor {
            border-color: var(--line-chilonzor);
        }

        .qr-card.ozbekiston {
            border-color: var(--line-ozbekiston);
        }

        .qr-card.yunusobod {
            border-color: var(--line-yunusobod);
        }

        .qr-card.halqa {
            border-color: var(--line-halqa);
        }

        .brand-header {
            text-align: center;
            margin-bottom: auto;
            margin-top: 20px;
        }

        .brand-logo {
            width: 80px;
            height: 80px;
            background-color: #1e293b;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            margin: 0 auto 15px auto;
        }

        .brand-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1e293b;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* QR Code Styling Area */
        .qr-wrapper {
            position: relative;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            /* Outline matches line color dynamically via inline styles later or CSS */
        }

        .qr-wrapper.chilonzor {
            outline: 4px solid var(--line-chilonzor);
            offset: 10px;
        }

        .qr-wrapper.ozbekiston {
            outline: 4px solid var(--line-ozbekiston);
        }

        .qr-wrapper.yunusobod {
            outline: 4px solid var(--line-yunusobod);
        }

        .qr-wrapper.halqa {
            outline: 4px solid var(--line-halqa);
        }

        .qr-code-canvas {
            width: 250px;
            height: 250px;
        }

        /* Superimposed Center Logo */
        .qr-center-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background-color: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #1e293b;
            border: 3px solid white;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
        }

        .station-details {
            text-align: center;
            margin-top: 40px;
            margin-bottom: auto;
        }

        .station-name {
            font-size: 2.5rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 10px;
        }

        .station-line {
            font-size: 1.2rem;
            font-weight: 600;
            color: #64748b;
            text-transform: capitalize;
        }

        .call-to-action {
            width: 100%;
            text-align: center;
            background-color: #f1f5f9;
            padding: 25px;
            border-radius: 12px;
            margin-top: auto;
        }

        .cta-text {
            font-size: 1.2rem;
            font-weight: 600;
            color: #334155;
            margin: 5px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }

            .controls {
                display: none;
            }

            #qr-container {
                gap: 0;
            }

            .qr-card {
                box-shadow: none;
                border-radius: 0;
                margin: 0;
            }
        }
    </style>
</head>

<body>

    <div class="controls">
        <h1>Tashkent Metro - Automated QR Code PDF/Print Generator</h1>
        <p>This script reads data.js and generates 50+ unique QR codes mapped to their exact deep-links.<br>Press the
            button below to open the Print Dialog.</p>
        <button onclick="window.print()">Print Labels / Save to PDF</button>
    </div>

    <!-- Container for the auto-generated templates -->
    <div id="qr-container"></div>

    <!-- Import our dataset -->
    <script src="js/data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('qr-container');

            // Generate absolute base URL to the index.html for scanning
            // Example: https://metro-tashkent.app/index.html
            // If running locally, this uses the local path. Replace with production URL before official printing.
            const baseUrl = window.location.href.replace('qr-generator.html', 'index.html');

            appData.stationsList.forEach(station => {
                const deepLink = `${baseUrl}?station=${station.id}`;

                // Create Card Structure
                const card = document.createElement('div');
                card.className = `qr-card ${station.line}`;

                card.innerHTML = `
                    <div class="brand-header">
                        <div class="brand-logo">M</div>
                        <h2 class="brand-title">Toshkent Metropoliteni</h2>
                    </div>

                    <div class="qr-wrapper ${station.line}">
                        <div id="qr-${station.id}" class="qr-code-canvas"></div>
                        <div class="qr-center-logo">M</div>
                    </div>

                    <div class="station-details">
                        <div class="station-name">${station.name}</div>
                        <div class="station-line">${station.line} Yo'li / Line</div>
                    </div>

                    <div class="call-to-action">
                        <div class="cta-text">🇷🇺 Отсканируйте для информации</div>
                        <div class="cta-text">🇺🇿 Gidni o'qish uchun skanerlang</div>
                        <div class="cta-text">🇬🇧 Scan for Station Info & Map</div>
                    </div>
                `;

                container.appendChild(card);

                // Generate QR Code using the CDN library
                new QRCode(document.getElementById(`qr-${station.id}`), {
                    text: deepLink,
                    width: 250,
                    height: 250,
                    colorDark: "#0f172a",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H // High error correction to allow for center logo overlap
                });
            });
        });
    </script>
</body>

</html>
