<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tashkent Metro QR Info</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Ionicons for Icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-logo">
                <ion-icon name="train-outline"></ion-icon>
                <span data-i18n="app-title">Metro Tashkent</span>
            </div>
            <div class="header-actions">
                <button id="lang-btn" class="icon-btn">
                    <ion-icon name="language-outline"></ion-icon>
                    <span id="current-lang">EN</span>
                </button>
                <div id="lang-dropdown" class="dropdown hidden">
                    <button class="lang-option" data-lang="uz">O'zbek</button>
                    <button class="lang-option" data-lang="ru">Русский</button>
                    <button class="lang-option" data-lang="en">English</button>
                </div>
                <button id="theme-btn" class="icon-btn">
                    <ion-icon name="moon-outline" id="theme-icon"></ion-icon>
                </button>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="app-main" id="main-content">
            <!-- Map View -->
            <section id="view-map" class="view active">
                <h2 data-i18n="nav-map">Interactive Map</h2>
                <div class="card glassmorphism map-card"
                    style="padding: 0; overflow: hidden; border-radius: var(--radius-lg);">
                    <img src="assets/map.jpg" alt="Tashkent Metro Map"
                        style="width: 100%; height: auto; display: block; object-fit: cover;">
                </div>
            </section>

            <!-- Schedule View -->
            <section id="view-schedule" class="view hidden">
                <h2 data-i18n="nav-schedule">Real-time Schedule</h2>

                <!-- Line Filter -->
                <div class="line-selector glassmorphism" data-target-select="station-select">
                    <button class="line-pill" data-line="chilonzor"
                        style="--line-color: var(--line-chilonzor);">Chilonzor</button>
                    <button class="line-pill" data-line="ozbekiston"
                        style="--line-color: var(--line-ozbekiston);">O'zbekiston</button>
                    <button class="line-pill" data-line="yunusobod"
                        style="--line-color: var(--line-yunusobod);">Yunusobod</button>
                    <button class="line-pill" data-line="halqa" style="--line-color: var(--line-halqa);">Halqa</button>
                </div>

                <div class="station-selector">
                    <select id="station-select" class="custom-select" disabled>
                        <option value="" disabled selected data-i18n="select-line-first">Select a Line first</option>
                        <!-- Populated by JS -->
                    </select>
                </div>
                <!-- Dynamic Schedule Container -->
                <div id="schedule-container" class="card-list"></div>
            </section>

            <!-- Services / Details View -->
            <section id="view-services" class="view hidden">
                <h2 data-i18n="nav-services">Explorer</h2>

                <!-- Line Filter -->
                <div class="line-selector glassmorphism" data-target-select="services-station-select">
                    <button class="line-pill" data-line="chilonzor"
                        style="--line-color: var(--line-chilonzor);">Chilonzor</button>
                    <button class="line-pill" data-line="ozbekiston"
                        style="--line-color: var(--line-ozbekiston);">O'zbekiston</button>
                    <button class="line-pill" data-line="yunusobod"
                        style="--line-color: var(--line-yunusobod);">Yunusobod</button>
                    <button class="line-pill" data-line="halqa" style="--line-color: var(--line-halqa);">Halqa</button>
                </div>

                <div class="station-selector">
                    <select id="services-station-select" class="custom-select" disabled>
                        <option value="" disabled selected data-i18n="select-line-first">Select a Line first</option>
                        <!-- Populated by JS -->
                    </select>
                </div>

                <div id="station-detail-content" style="display: none;">
                    <!-- Photo Header -->
                    <div class="detail-photo-wrapper">
                        <img id="detail-photo" src="" alt="Station Photo" class="detail-photo" />
                    </div>

                    <!-- Glassmorphism Container -->
                    <div class="card glassmorphism premium-detail-card">

                        <!-- Services Badges -->
                        <div class="service-badges" id="detail-services">
                            <!-- Badges injected via JS -->
                        </div>

                        <hr class="detail-divider">

                        <!-- History -->
                        <div class="detail-section">
                            <h3 data-i18n="lbl-history"><ion-icon name="book-outline"></ion-icon> History</h3>
                            <p id="detail-history" class="premium-text"></p>
                        </div>

                        <!-- Exits -->
                        <div class="detail-section" id="section-exits">
                            <h3 data-i18n="lbl-exits"><ion-icon name="log-out-outline"></ion-icon> Exits</h3>
                            <ul class="nearby-list" id="detail-exits">
                                <!-- Items injected via JS -->
                            </ul>
                        </div>

                        <!-- Nearby Attractions -->
                        <div class="detail-section">
                            <h3 data-i18n="lbl-nearby"><ion-icon name="location-outline"></ion-icon> Nearby Attractions
                            </h3>
                            <ul class="nearby-list" id="detail-nearby">
                                <!-- Items injected via JS -->
                            </ul>
                        </div>
                    </div>
                </div>

                <div id="station-detail-empty" style="text-align: center; margin-top: 40px; color: var(--text-muted);">
                    <ion-icon name="map-outline" style="font-size: 4rem; opacity: 0.5; margin-bottom: 15px;"></ion-icon>
                    <p>Select a detailed station guide from the dropdown.</p>
                </div>
            </section>

            <!-- Profile View -->
            <section id="view-profile" class="view hidden">
                <h2 data-i18n="nav-profile">User Profile</h2>
                <div class="profile-header card glassmorphism" style="flex-direction: column; align-items: stretch;">
                    <div
                        style="display: flex; align-items: center; gap: var(--spacing-md); margin-bottom: var(--spacing-md);">
                        <div class="profile-avatar">
                            <ion-icon name="person-circle"></ion-icon>
                        </div>
                        <div class="profile-info">
                            <h3>Passenger ID: #QR9382</h3>
                            <p>Scanning since: <span id="join-date">Oct 2023</span></p>
                        </div>
                    </div>

                    <div class="balance-card"
                        style="background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; padding: var(--spacing-md); border-radius: var(--radius-md); display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <p style="color: rgba(255,255,255,0.8); margin: 0; font-size: 0.85rem;"
                                data-i18n="profile-balance">ATTO Balance</p>
                            <h2 style="margin: 0; font-size: 1.8rem;">14,500 <span style="font-size: 1rem;">UZS</span>
                            </h2>
                        </div>
                        <ion-icon name="card-outline" style="font-size: 3rem; opacity: 0.5;"></ion-icon>
                    </div>
                </div>

                <div class="settings-group">
                    <h3 data-i18n="profile-favorites">Favorite Routes</h3>
                    <ul class="list-container" id="favorites-list">
                        <li class="list-item">
                            <div class="route-info">
                                <span class="station-name">Olmazor <ion-icon name="arrow-forward-outline"></ion-icon>
                                    Buyuk Ipak Yuli</span>
                            </div>
                            <button class="icon-btn danger"><ion-icon name="trash-outline"></ion-icon></button>
                        </li>
                    </ul>
                </div>
            </section>

            <!-- News View -->
            <section id="view-news" class="view hidden">
                <h2 data-i18n="nav-news">News & Alerts</h2>
                <div class="news-feed" id="news-feed">
                    <!-- Loaded dynamically -->
                </div>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-target="view-map">
                <ion-icon name="map-outline"></ion-icon>
                <span data-i18n="nav-map">Map</span>
            </button>
            <button class="nav-item" data-target="view-schedule">
                <ion-icon name="time-outline"></ion-icon>
                <span data-i18n="nav-schedule">Schedule</span>
            </button>
            <button class="nav-item" data-target="view-services">
                <ion-icon name="information-circle-outline"></ion-icon>
                <span data-i18n="nav-services">Services</span>
            </button>
            <button class="nav-item" data-target="view-profile">
                <ion-icon name="person-outline"></ion-icon>
                <span data-i18n="nav-profile">Profile</span>
            </button>
            <button class="nav-item" data-target="view-news">
                <ion-icon name="notifications-outline"></ion-icon>
                <span data-i18n="nav-news">News</span>
                <span class="badge" id="news-badge">2</span>
            </button>
        </nav>
    </div>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
